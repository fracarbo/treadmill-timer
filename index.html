<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treadmill Dynamic Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .speed-display {
            font-size: clamp(5rem, 20vw, 12rem);
            line-height: 1;
            font-weight: 900;
        }

        .flash-active {
            animation: flash-bg 0.5s ease-out;
        }

        @keyframes flash-bg {
            0% { background-color: rgba(59, 130, 246, 0.5); }
            100% { background-color: transparent; }
        }

        .timer-text {
            font-variant-numeric: tabular-nums;
        }

        /* Nascondi frecce input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .stepper-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 2rem;
            width: 3rem;
            height: 3rem;
            padding-left: 1rem;
            padding-right: 1rem;
            background-color: rgb(51 65 85);
            border-radius: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            transition: background-color 0.15s, color 0.15s;
        }
        .stepper-btn:active {
            background-color: rgb(37 99 235);
        }

        /* Stile per il modale di conferma */
        #confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Modale di Conferma Stop Personalizzato -->
    <div id="confirm-modal">
        <div class="glass-panel p-8 rounded-[2.5rem] max-w-sm w-full text-center space-y-8 border-2 border-red-500/20 shadow-2xl shadow-black">
            <div class="space-y-2">
                <h2 class="text-3xl font-black uppercase tracking-tight text-white">Terminare?</h2>
                <p class="text-slate-400 font-medium">Vuoi fermarti ora e vedere il riepilogo finale?</p>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="executeStop()" class="bg-red-600 hover:bg-red-500 active:scale-95 py-5 rounded-2xl font-black text-white shadow-xl shadow-red-900/40 uppercase tracking-widest">SÌ, STOP</button>
                <button onclick="closeStopModal()" class="bg-slate-800 hover:bg-slate-700 active:scale-95 py-5 rounded-2xl font-black text-slate-400 uppercase tracking-widest">ANNULLA</button>
            </div>
        </div>
    </div>

    <!-- Configurazione Iniziale -->
    <div id="setup-screen" class="w-full max-w-md space-y-6">
        <img src="assets/images/logo.png" alt="Paceflow Dynamic Treadmill Timer" class="w-full max-w-sm mx-auto mb-0 h-auto block">
        
        <div class="glass-panel p-6 rounded-3xl space-y-8">
            <!-- GRUPPO VELOCITÀ -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 pb-1 border-b border-blue-500/20">
                    <span class="text-blue-400 text-lg">⚡</span>
                    <h2 class="text-sm font-black uppercase tracking-[0.2em] text-blue-400">Velocità</h2>
                </div>
                
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Range (km/h)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <span class="text-[9px] text-slate-600 uppercase ml-1">Min</span>
                            <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                                <button onclick="step('min-speed', -0.1)" class="stepper-btn">−</button>
                                <input type="number" id="min-speed" step="0.1" value="2" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                                <button onclick="step('min-speed', 0.1)" class="stepper-btn">+</button>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <span class="text-[9px] text-slate-600 uppercase ml-1">Max</span>
                            <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                                <button onclick="step('max-speed', -0.1)" class="stepper-btn">−</button>
                                <input type="number" id="max-speed" step="0.1" value="12" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                                <button onclick="step('max-speed', 0.1)" class="stepper-btn">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Step Incremento (km/h)</label>
                    <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                        <button onclick="step('speed-step', -0.1)" class="stepper-btn">−</button>
                        <input type="number" id="speed-step" step="0.1" value="0.5" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                        <button onclick="step('speed-step', 0.1)" class="stepper-btn">+</button>
                    </div>
                </div>
            </div>

            <!-- GRUPPO TEMPO -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 pb-1 border-b border-emerald-500/20">
                    <span class="text-emerald-400 text-lg">⏱️</span>
                    <h2 class="text-sm font-black uppercase tracking-[0.2em] text-emerald-400">Tempo</h2>
                </div>

                <div class="space-y-3">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Frequenza Cambio (min:sec)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                            <button onclick="step('change-min', -1)" class="stepper-btn">−</button>
                            <input type="number" id="change-min" value="1" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                            <button onclick="step('change-min', 1)" class="stepper-btn">+</button>
                        </div>
                        <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                            <button onclick="step('change-sec', -5)" class="stepper-btn">−</button>
                            <input type="number" id="change-sec" value="0" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                            <button onclick="step('change-sec', 5)" class="stepper-btn">+</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Durata Totale (min)</label>
                    <div class="flex items-center bg-slate-800/50 rounded-2xl p-1 border border-slate-700/50">
                        <button onclick="step('total-duration', -1)" class="stepper-btn">−</button>
                        <input type="number" id="total-duration" value="30" class="w-full bg-transparent border-none text-center text-xl font-bold focus:ring-0 p-2">
                        <button onclick="step('total-duration', 1)" class="stepper-btn">+</button>
                    </div>
                </div>
            </div>

            <button onclick="startWorkout()" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-900/40 text-xl uppercase tracking-widest mt-2">
                Avvia Allenamento
            </button>
        </div>
    </div>

    <!-- Schermo Allenamento Attivo -->
    <div id="workout-screen" class="hidden w-full max-w-4xl h-full flex flex-col items-center justify-between space-y-8">
        <div class="w-full flex justify-between items-center px-6 pt-4">
            <div class="text-left">
                <p class="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em]">Rimanente</p>
                <p id="time-remaining" class="timer-text text-3xl md:text-4xl font-black text-blue-500">00:00</p>
            </div>
            <div class="text-right">
                <p class="text-slate-500 text-[10px] uppercase font-black tracking-[0.2em]">Trascorso</p>
                <p id="time-elapsed" class="timer-text text-3xl md:text-4xl font-black text-slate-300">00:00</p>
            </div>
        </div>

        <div id="speed-container" class="flex flex-col items-center justify-center py-12 rounded-full w-full max-w-[320px] md:max-w-md aspect-square glass-panel transition-all duration-300 shadow-[0_0_50px_rgba(59,130,246,0.15)] border-4 border-blue-500/20">
            <p class="text-blue-500 text-lg md:text-2xl font-black tracking-[0.3em] uppercase mb-[-10px]">Velocità</p>
            <div id="current-speed" class="speed-display text-white drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]">--</div>
            <p class="text-slate-500 text-2xl md:text-3xl font-bold mt-[-10px]">km/h</p>
        </div>

        <div class="w-full max-w-md grid grid-cols-2 gap-6 pb-12 px-6">
            <button id="pause-btn" onclick="togglePause()" class="bg-slate-800 hover:bg-slate-700 active:scale-95 py-6 rounded-[2rem] text-xl font-black transition-all uppercase tracking-widest border border-slate-700 shadow-xl">
                Pausa
            </button>
            <button onclick="openStopModal()" class="bg-red-950/30 text-red-500 border-2 border-red-500/30 hover:bg-red-600 hover:text-white active:scale-95 py-6 rounded-[2rem] text-xl font-black transition-all uppercase tracking-widest shadow-xl shadow-red-950/20">
                Stop
            </button>
        </div>
    </div>

    <!-- Riepilogo Finale -->
    <div id="summary-screen" class="hidden w-full max-w-2xl space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-black text-white uppercase tracking-tighter">Sessione Conclusa</h1>
            <p class="text-green-500 font-bold uppercase tracking-widest text-sm">Ottimo lavoro!</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass-panel p-6 rounded-[2rem] text-center border-b-4 border-blue-500/30 shadow-xl">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Tempo</p>
                <p id="sum-duration" class="text-2xl font-black text-white">--</p>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] text-center border-b-4 border-purple-500/30 shadow-xl">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Cambi</p>
                <p id="sum-changes" class="text-2xl font-black text-white">--</p>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] text-center border-b-4 border-orange-500/30 shadow-xl">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Media</p>
                <p id="sum-avg" class="text-2xl font-black text-white">--</p>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] text-center border-b-4 border-red-500/30 shadow-xl">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Min/Max</p>
                <p id="sum-range" class="text-2xl font-black text-white">--</p>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-[2.5rem] h-[350px] shadow-2xl border border-white/5">
            <canvas id="workoutChart"></canvas>
        </div>

        <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-black py-6 rounded-2xl transition-all shadow-2xl shadow-blue-900/40 text-xl uppercase tracking-[0.2em]">
            NUOVA SESSIONE
        </button>
    </div>

    <script>
        let timer = null;
        let changeTimer = 0;
        let elapsed = 0;
        let totalSec = 0;
        let changeFreqSec = 0;
        let isPaused = false;
        let workoutData = [];
        let currentSpeed = 0;
        let lastSpeed = 0;
        let workoutActive = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function step(id, amount) {
            const input = document.getElementById(id);
            let val = parseFloat(input.value) || 0;
            val = +(val + amount).toFixed(2);
            if (val < 0) val = 0;
            input.value = val;
            // Trigger change event if needed
            input.dispatchEvent(new Event('change'));
        }

        function playBeep() {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) { console.error("Audio error", e); }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function generateNewSpeed() {
            const min = parseFloat(document.getElementById('min-speed').value);
            const max = parseFloat(document.getElementById('max-speed').value);
            const step = parseFloat(document.getElementById('speed-step').value);
            
            const options = [];
            for (let s = min; s <= max; s = +(s + step).toFixed(2)) {
                options.push(s);
            }

            let nextSpeed;
            if (options.length === 0) return min;

            do {
                nextSpeed = options[Math.floor(Math.random() * options.length)];
            } while (options.length > 1 && nextSpeed === lastSpeed);

            lastSpeed = nextSpeed;
            return nextSpeed;
        }

        function triggerFlash() {
            const container = document.getElementById('speed-container');
            container.classList.add('flash-active');
            setTimeout(() => container.classList.remove('flash-active'), 500);
            
            if ('vibrate' in navigator) navigator.vibrate(200);
            playBeep();
        }

        function startWorkout() {
            const durationMin = parseFloat(document.getElementById('total-duration').value);
            const freqMin = parseInt(document.getElementById('change-min').value) || 0;
            const freqSec = parseInt(document.getElementById('change-sec').value) || 0;
            
            totalSec = Math.floor(durationMin * 60);
            changeFreqSec = (freqMin * 60) + freqSec;
            
            if (totalSec <= 0 || changeFreqSec <= 0) {
                alert("Inserisci valori validi.");
                return;
            }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('workout-screen').classList.remove('hidden');

            elapsed = 0;
            changeTimer = 0;
            workoutData = [];
            isPaused = false;
            workoutActive = true;
            
            updateSpeed();
            
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                if (isPaused) return;

                elapsed++;
                changeTimer++;

                document.getElementById('time-elapsed').textContent = formatTime(elapsed);
                document.getElementById('time-remaining').textContent = formatTime(Math.max(0, totalSec - elapsed));

                if (changeTimer >= changeFreqSec) {
                    updateSpeed();
                    changeTimer = 0;
                }

                if (elapsed >= totalSec) {
                    executeStop();
                }
            }, 1000);
        }

        function updateSpeed() {
            currentSpeed = generateNewSpeed();
            document.getElementById('current-speed').textContent = currentSpeed.toFixed(1);
            workoutData.push({ time: elapsed, speed: currentSpeed });
            triggerFlash();
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pause-btn');
            btn.textContent = isPaused ? 'Riprendi' : 'Pausa';
            btn.classList.toggle('bg-blue-600', isPaused);
            btn.classList.toggle('bg-slate-700', !isPaused);
        }

        // Funzioni per il modale di stop
        function openStopModal() {
            isPaused = true; // Mettiamo in pausa mentre si decide
            document.getElementById('confirm-modal').style.display = 'flex';
        }

        function closeStopModal() {
            document.getElementById('confirm-modal').style.display = 'none';
            // Se non era già in pausa prima di aprire il modale, riprendiamo
            const pauseBtn = document.getElementById('pause-btn');
            if (pauseBtn.textContent === 'Pausa') {
                isPaused = false;
            }
        }

        function executeStop() {
            workoutActive = false;
            if(timer) clearInterval(timer);
            document.getElementById('confirm-modal').style.display = 'none';
            document.getElementById('workout-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            showSummary();
        }

        function showSummary() {
            if (workoutData.length === 0) return;

            const speeds = workoutData.map(d => d.speed);
            const avg = speeds.reduce((a, b) => a + b, 0) / speeds.length;
            const max = Math.max(...speeds);
            const min = Math.min(...speeds);

            document.getElementById('sum-duration').textContent = formatTime(elapsed);
            document.getElementById('sum-changes').textContent = workoutData.length;
            document.getElementById('sum-avg').textContent = avg.toFixed(1) + ' km/h';
            document.getElementById('sum-range').textContent = `${min} / ${max}`;

            const ctx = document.getElementById('workoutChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: workoutData.map(d => formatTime(d.time)),
                    datasets: [{
                        label: 'Velocità (km/h)',
                        data: workoutData.map(d => d.speed),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        stepped: true,
                        tension: 0,
                        pointRadius: 3,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', maxRotation: 0 }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
